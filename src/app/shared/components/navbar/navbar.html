<nav class="navbar">
  <div class="navbar__brand">
    <a class="navbar__logo" href="/">
      <svg class="navbar__logo-icon" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="1" y="5" width="26" height="18" rx="3" stroke="currentColor" stroke-width="1.6"/>
        <rect x="5" y="10" width="7" height="5" rx="1" fill="currentColor" opacity="0.35"/>
        <rect x="5" y="10" width="7" height="5" rx="1" stroke="currentColor" stroke-width="1.2"/>
        <line x1="14" y1="10" x2="22" y2="10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        <line x1="14" y1="13" x2="20" y2="13" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        <line x1="14" y1="16" x2="22" y2="16" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      </svg>
      <span class="navbar__logo-text">
        <span class="navbar__logo-main">TAPAXE</span>
        <span class="navbar__logo-sub">SMART CARD</span>
      </span>
    </a>
  </div>

  <div class="navbar__actions">
    <button
      class="theme-toggle"
      [class.theme-toggle--dark]="themeService.theme() === 'dark-theme'"
      (click)="themeService.toggle()"
      [attr.aria-label]="themeService.theme() === 'light-theme' ? 'Switch to dark mode' : 'Switch to light mode'"
    >
      <span class="theme-toggle__track">
        <span class="theme-toggle__thumb">
          <svg class="theme-toggle__icon theme-toggle__icon--sun" viewBox="0 0 16 16" fill="none">
            <circle cx="8" cy="8" r="3.5" stroke="currentColor" stroke-width="1.5"/>
            <line x1="8" y1="1" x2="8" y2="3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="8" y1="13" x2="8" y2="15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="1" y1="8" x2="3" y2="8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="13" y1="8" x2="15" y2="8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="2.93" y1="2.93" x2="4.34" y2="4.34" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="11.66" y1="11.66" x2="13.07" y2="13.07" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="2.93" y1="13.07" x2="4.34" y2="11.66" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="11.66" y1="4.34" x2="13.07" y2="2.93" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <svg class="theme-toggle__icon theme-toggle__icon--moon" viewBox="0 0 16 16" fill="none">
            <path d="M13.5 10.5A6 6 0 0 1 5.5 2.5a6 6 0 1 0 8 8z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>
      </span>
    </button>
  </div>
</nav>
